<div class="contenedor">

  <h1 class="titulo">¿Le escribo o no? 💬</h1>

  <p class="descripcion">
    Describe lo que sientes o lo que viste (foto, sonrisa, historia...)  
    y te diré si escribirle y qué decir 😏
  </p>

  <!-- 🔥 ANUNCIO EN MEDIO -->

  <div class="card">

    <div class="input-group">

      <input type="text" id="nombre" placeholder="Ej: María...">
    </div>

    <div class="input-group">
      <label>¿Qué quieres decir o qué pasó?</label>
      <textarea id="mensaje" placeholder="Ej: Subió una foto hermosa... o me ignora pero me gusta..."></textarea>
    </div>

    <button id="btn">
      <span id="textoBtn">Analizar 🔥</span>
    </button>

  </div>

  <div id="loader" class="loader oculto">
    <span>Analizando</span>
    <div class="dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div id="resultado" class="resultado"></div>

  <div id="riesgo" class="riesgo oculto"></div>

  <div id="recomendacion" class="recomendacion oculto">

    <div class="botones-copy">
      <button id="copiar">📋 Copiar</button>
      <button id="otro">🔄 Otra opción</button>
    </div>
  </div>
